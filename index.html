<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Efe's Mansion | Jarvis OS</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --jarvis-green: #00ff88; --dark-bg: #0a0a0a; }
        body { background-color: var(--dark-bg); color: white; font-family: 'JetBrains Mono', monospace; margin: 0; }
        
        /* Terminal Yazı Efekti Alanı */
        #terminal {
            background: #000;
            padding: 20px;
            color: var(--jarvis-green);
            min-height: 150px;
            border-bottom: 2px solid var(--jarvis-green);
            margin-bottom: 20px;
        }

        .container { max-width: 600px; margin: auto; padding: 20px; text-align: center; }
        .version-badge { border: 1px solid var(--jarvis-green); color: var(--jarvis-green); padding: 5px 15px; border-radius: 20px; font-size: 12px; }
        .main-title { font-family: 'Orbitron', sans-serif; font-size: 2.5rem; margin-top: 20px; }
        .card { background: #111; border: 1px solid #333; padding: 20px; border-radius: 12px; margin: 15px 0; text-align: left; }
        .btn { display: block; padding: 15px; margin: 10px 0; border-radius: 8px; text-decoration: none; font-weight: bold; text-align: center; }
        .btn-green { background: var(--jarvis-green); color: #000; }
        .contact-link { color: var(--jarvis-green); text-decoration: none; display: block; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="terminal"></div>

    <div class="container">
        <div class="version-badge">JAVA EDITION 1.20.1</div>
        <h1 class="main-title">Efe's Mansion</h1>
        <p style="color: #888;">Akıllı Minecraft Haritası</p>

        <a href="#" class="btn btn-green">📥 Haritayı İndir</a>
        <a href="https://github.com/Muhammed-Efe/efe-s-Mansion/releases" class="btn" style="border: 1px solid #444; color: white;">📂 GitHub'da Gör</a>

        <div class="card">
            <h3 style="color:var(--jarvis-green)">⚡ Işık Otomasyonu</h3>
            <p style="font-size:14px; color:#aaa;">Gece/gündüz döngüsüne göre tüm malikane ışıkları Jarvis tarafından yönetilir.</p>
        </div>

        <div class="card">
            <h3 style="color:var(--jarvis-green)">📩 İletişim</h3>
            <a href="mailto:muhammedefafalcon@gmail.com" class="contact-link">muhammedefafalcon@gmail.com</a>
        </div>
    </div>

    <script>
        // Yazma Efekti Fonksiyonu
        const lines = [
            "● JARVIS SYSTEM ONLINE",
            "> JARVIS v2.0.0 — Sistem Başlatılıyor...",
            "> Redstone devreleri kontrol ediliyor... [OK]",
            "> Işık otomasyonu modülü yükleniyor... [OK]",
            "> Asistan sistemi aktif.",
            "> HOŞ GELDİNİZ, Kullanıcı."
        ];

        let lineIndex = 0;
        let charIndex = 0;
        const terminal = document.getElementById("terminal");

        function type() {
            if (lineIndex < lines.length) {
                if (charIndex < lines[lineIndex].length) {
                    terminal.innerHTML += lines[lineIndex].charAt(charIndex);
                    charIndex++;
                    setTimeout(type, 30); // Yazım hızı
                } else {
                    terminal.innerHTML += "<br>";
                    lineIndex++;
                    charIndex = 0;
                    setTimeout(type, 500); // Satır arası bekleme
                }
            }
        }
        window.onload = type;
    </script>
</body>
</html>
